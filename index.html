<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모의고사 분석 시스템 - 민족사관고등학교</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1729;
      --surface: #1a2332;
      --surface2: #242f42;
      --surface3: #2d3a52;
      --border: rgba(255,255,255,0.08);
      --border-h: rgba(255,255,255,0.15);
      --primary: #4a90e2;
      --primary-light: #6ba3e8;
      --primary-dim: rgba(74,144,226,0.12);
      --gold: #d4af37;
      --text: #e8f0f8;
      --text-secondary: #b8c9db;
      --text-muted: #7a8ba3;
      --success: #28a745;
      --warning: #ffc107;
      --error: #ef4444;
      --radius: 16px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a2841 50%, var(--bg) 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* 헤더 */
    .header {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 24px;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .school-tag {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--primary-light);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .school-tag::before,
    .school-tag::after {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--primary-light);
    }

    .header h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-muted);
    }

    /* 탭 */
    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      background: var(--surface);
      padding: 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 14px 24px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab:hover {
      background: var(--primary-dim);
      color: var(--primary-light);
    }

    .tab.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(74,144,226,0.3);
    }

    /* 학생 그리드 */
    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .student-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .student-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .student-card::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, var(--primary-dim) 0%, transparent 70%);
      border-radius: 50%;
      transform: translate(40%, -40%);
      pointer-events: none;
    }

    .student-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(74,144,226,0.2);
    }

    .student-card:hover::before {
      opacity: 1;
    }

    .student-number {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .student-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .student-stats {
      display: flex;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .stat-item {
      flex: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-light);
    }

    .stat-value.good {
      color: var(--success);
    }

    .stat-value.average {
      color: var(--warning);
    }

    .stat-value.poor {
      color: var(--error);
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      color: var(--text-muted);
    }

    /* 에러 */
    .error {
      background: var(--surface);
      border: 2px solid var(--error);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--error);
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 28px;
      }

      .tabs {
        flex-direction: column;
      }

      .students-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 헤더 -->
    <div class="header">
      <div class="school-tag">
        <span>민족사관고등학교</span>
      </div>
      <h1>📊 모의고사 분석 시스템</h1>
      <p>3학년 2반 성적 분석 및 추이 관리</p>
    </div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab active" data-month="all">전체</button>
      <button class="tab" data-month="3월">3월</button>
      <button class="tab" data-month="5월">5월</button>
      <button class="tab" data-month="6월">6월</button>
      <button class="tab" data-month="7월">7월</button>
      <button class="tab" data-month="9월">9월</button>
      <button class="tab" data-month="10월">10월</button>
    </div>

    <!-- 학생 목록 -->
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">학생 데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzhGzErp_fxQOh8HDHHGEIn305UuO05OHXLzimvrNsOXfbFltG7V0uczk_diEu_HsViPg/exec';

    let studentsData = [];
    let examsData = {};
    let currentMonth = 'all';

    // 초기화
    async function init() {
      try {
        // 학생 목록 가져오기
        const students = await fetchStudents();
        studentsData = students;

        // 각 월별 시험 데이터 가져오기
        const months = ['3월', '5월', '6월', '7월', '9월', '10월'];
        for (const month of months) {
          const data = await fetchExamData(month);
          examsData[month] = data;
        }

        // 렌더링
        renderStudents();
      } catch (error) {
        console.error('초기화 오류:', error);
        showError('데이터를 불러오는데 실패했습니다.');
      }
    }

    // API 호출: 학생 목록
    async function fetchStudents() {
      const response = await fetch(`${API_URL}?action=getAllStudents`);
      const data = await response.json();
      return data;
    }

    // API 호출: 월별 시험 데이터
    async function fetchExamData(month) {
      try {
        const response = await fetch(`${API_URL}?action=getExamData&month=${month}`);
        const data = await response.json();
        return data;
      } catch (error) {
        console.error(`${month} 데이터 로드 실패:`, error);
        return [];
      }
    }

    // 학생 카드 렌더링
    function renderStudents() {
      const content = document.getElementById('content');

      if (studentsData.length === 0) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">👥</div>
            <h3>학생 데이터가 없습니다</h3>
            <p>학생명단 시트를 확인해주세요</p>
          </div>
        `;
        return;
      }

      const html = `
        <div class="students-grid">
          ${studentsData.map(student => {
            const stats = getStudentStats(student.이름, currentMonth);
            return `
              <div class="student-card" onclick="goToStudent('${student.이름}')">
                <div class="student-number">${student.번호}번</div>
                <div class="student-name">${student.이름}</div>
                <div class="student-stats">
                  <div class="stat-item">
                    <div class="stat-label">시험 횟수</div>
                    <div class="stat-value">${stats.count}회</div>
                  </div>
                  <div class="stat-item">
                    <div class="stat-label">평균 등급</div>
                    <div class="stat-value ${getGradeClass(stats.avgGrade)}">${stats.avgGrade || '-'}</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;

      content.innerHTML = html;
    }

    // 학생 통계 계산
    function getStudentStats(studentName, month) {
      let exams = [];

      if (month === 'all') {
        // 전체 월 데이터
        Object.values(examsData).forEach(monthData => {
          if (monthData && Array.isArray(monthData)) {
            const studentExam = monthData.find(e => e.이름 === studentName);
            if (studentExam) exams.push(studentExam);
          }
        });
      } else {
        // 특정 월 데이터
        const monthData = examsData[month];
        if (monthData && Array.isArray(monthData)) {
          const studentExam = monthData.find(e => e.이름 === studentName);
          if (studentExam) exams.push(studentExam);
        }
      }

      if (exams.length === 0) {
        return { count: 0, avgGrade: null };
      }

      // 평균 등급 계산 (국어, 수학, 영어)
      let totalGrade = 0;
      let gradeCount = 0;

      exams.forEach(exam => {
        if (exam.국어_등급) {
          totalGrade += parseInt(exam.국어_등급);
          gradeCount++;
        }
        if (exam.수학_등급) {
          totalGrade += parseInt(exam.수학_등급);
          gradeCount++;
        }
        if (exam.영어_등급) {
          totalGrade += parseInt(exam.영어_등급);
          gradeCount++;
        }
      });

      const avgGrade = gradeCount > 0 ? (totalGrade / gradeCount).toFixed(1) : null;

      return {
        count: exams.length,
        avgGrade: avgGrade
      };
    }

    // 등급 색상 클래스
    function getGradeClass(grade) {
      if (!grade) return '';
      const g = parseFloat(grade);
      if (g <= 2) return 'good';
      if (g <= 4) return 'average';
      return 'poor';
    }

    // 학생 상세 페이지로 이동
    function goToStudent(studentName) {
      window.location.href = `student.html?name=${encodeURIComponent(studentName)}`;
    }

    // 에러 표시
    function showError(message) {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="error">
          <h3>⚠️ 오류</h3>
          <p>${message}</p>
        </div>
      `;
    }

    // 탭 클릭 이벤트
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // 활성 탭 변경
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // 월 변경
        currentMonth = tab.dataset.month;

        // 재렌더링
        renderStudents();
      });
    });

    // 초기화 실행
    init();
  </script>
</body>
</html>
