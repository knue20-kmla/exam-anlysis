<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모의고사 분석 시스템 - 민족사관고등학교</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f0f4f8;
      --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #f0f4f8 50%, #e1f5fe 100%);
      --sidebar-bg: #ffffff;
      --content-bg: #ffffff;
      --border: #e0e7ef;
      --border-hover: #4a90e2;
      --primary: #2196f3;
      --primary-dark: #1976d2;
      --primary-light: #64b5f6;
      --accent: #00bcd4;
      --text: #1a2332;
      --text-secondary: #546e7a;
      --text-muted: #90a4ae;
      --shadow: rgba(33, 150, 243, 0.08);
      --shadow-hover: rgba(33, 150, 243, 0.15);
      --grade-1: #4caf50;
      --grade-2: #8bc34a;
      --grade-3: #ffc107;
      --grade-4: #ff9800;
      --grade-5: #ff5722;
      --grade-poor: #f44336;
      --radius: 12px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* 사이드바 */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow-y: auto;
      box-shadow: 4px 0 12px var(--shadow);
      z-index: 100;
    }

    .sidebar-header {
      padding: 32px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 13px;
      opacity: 0.9;
    }

    /* 학생 목록 */
    .student-list {
      padding: 16px;
    }

    .student-list-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      padding: 0 8px;
    }

    .student-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      margin-bottom: 4px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .student-item:hover {
      border-color: var(--border-hover);
      box-shadow: 0 2px 8px var(--shadow-hover);
      transform: translateX(4px);
    }

    .student-item.active {
      background: linear-gradient(135deg, #e3f2fd 0%, #f0f8ff 100%);
      border-color: var(--primary);
      font-weight: 600;
    }

    .student-name {
      font-size: 15px;
      color: var(--text);
    }

    .student-badge {
      display: inline-block;
      padding: 4px 8px;
      background: var(--primary);
      color: white;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
    }

    /* 메인 콘텐츠 */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 40px;
      min-height: 100vh;
    }

    .content-header {
      margin-bottom: 24px;
    }

    .content-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .content-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* 월별 탭 */
    .month-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .month-tab {
      padding: 10px 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .month-tab:hover {
      border-color: var(--border-hover);
      background: #f5f9fc;
    }

    .month-tab.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 2px 8px var(--shadow-hover);
    }

    /* 성적 테이블 */
    .grade-table {
      background: var(--content-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .grade-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .grade-table th {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .grade-table th:last-child {
      border-right: none;
    }

    .grade-table td {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 14px;
    }

    .grade-table td:last-child {
      border-right: none;
    }

    .grade-table tr:last-child td {
      border-bottom: none;
    }

    .grade-table tbody tr:hover {
      background: #f5f9fc;
    }

    .subject-header {
      background: var(--primary-light) !important;
      color: white !important;
      font-size: 14px !important;
    }

    .grade-value {
      font-weight: 600;
    }

    .grade-1 { color: var(--grade-1); }
    .grade-2 { color: var(--grade-2); }
    .grade-3 { color: var(--grade-3); }
    .grade-4 { color: var(--grade-4); }
    .grade-5 { color: var(--grade-5); }
    .grade-poor { color: var(--grade-poor); }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 80px 20px;
    }

    .spinner {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      color: var(--text-muted);
    }

    /* 에러 */
    .error {
      background: white;
      border: 2px solid var(--grade-poor);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--grade-poor);
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* 반응형 */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: relative;
        height: auto;
      }

      .main-content {
        margin-left: 0;
      }

      .grade-table {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📊 모의고사 분석</h1>
      <p>민족사관고등학교 3학년 2반</p>
    </div>

    <!-- 학생 목록 -->
    <div class="student-list">
      <div class="student-list-title">학생 목록</div>
      <div id="studentList">
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">로딩 중...</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- 메인 콘텐츠 -->
  <main class="main-content">
    <div id="content">
      <div class="empty">
        <div class="empty-icon">👈</div>
        <h3>학생을 선택해주세요</h3>
        <p>왼쪽 사이드바에서 학생을 클릭하면 성적표를 볼 수 있습니다</p>
      </div>
    </div>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzhGzErp_fxQOh8HDHHGEIn305UuO05OHXLzimvrNsOXfbFltG7V0uczk_diEu_HsViPg/exec';

    let studentsData = [];
    let examsData = {};
    let selectedStudent = null;
    let currentMonth = 'all';

    // 초기화
    async function init() {
      try {
        const students = await fetchStudents();
        studentsData = students;

        const months = ['3월', '5월', '6월', '7월', '9월', '10월'];
        for (const month of months) {
          const data = await fetchExamData(month);
          examsData[month] = data;
        }

        renderStudentList();
      } catch (error) {
        console.error('초기화 오류:', error);
        showError('데이터를 불러오는데 실패했습니다.');
      }
    }

    async function fetchStudents() {
      const response = await fetch(`${API_URL}?action=getAllStudents`);
      return await response.json();
    }

    async function fetchExamData(month) {
      try {
        const response = await fetch(`${API_URL}?action=getExamData&month=${month}`);
        return await response.json();
      } catch (error) {
        return [];
      }
    }

    // 학생 목록 렌더링
    function renderStudentList() {
      const list = document.getElementById('studentList');

      if (studentsData.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>학생 데이터가 없습니다</p></div>';
        return;
      }

      list.innerHTML = studentsData.map(student => `
        <div class="student-item ${selectedStudent === student.이름 ? 'active' : ''}" onclick="selectStudent('${student.이름}')">
          <span class="student-name">${student.이름}</span>
          <span class="student-badge">${getExamCount(student.이름)}</span>
        </div>
      `).join('');
    }

    function getExamCount(studentName) {
      let count = 0;
      Object.values(examsData).forEach(monthData => {
        if (monthData && Array.isArray(monthData)) {
          if (monthData.find(e => e.이름 === studentName)) count++;
        }
      });
      return count + '회';
    }

    function selectStudent(studentName) {
      selectedStudent = studentName;
      currentMonth = 'all';
      renderStudentList();
      renderContent();
    }

    // 콘텐츠 렌더링
    function renderContent() {
      const content = document.getElementById('content');

      if (!selectedStudent) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">👈</div>
            <h3>학생을 선택해주세요</h3>
            <p>왼쪽 사이드바에서 학생을 클릭하면 성적표를 볼 수 있습니다</p>
          </div>
        `;
        return;
      }

      const grades = getStudentAllGrades(selectedStudent, currentMonth);

      content.innerHTML = `
        <div class="content-header">
          <h2 class="content-title">${selectedStudent} 학생 성적표</h2>
          <p class="content-subtitle">시험별 상세 성적을 확인할 수 있습니다</p>
        </div>

        <div class="month-tabs">
          <button class="month-tab ${currentMonth === 'all' ? 'active' : ''}" onclick="changeMonth('all')">전체</button>
          <button class="month-tab ${currentMonth === '3월' ? 'active' : ''}" onclick="changeMonth('3월')">3월</button>
          <button class="month-tab ${currentMonth === '5월' ? 'active' : ''}" onclick="changeMonth('5월')">5월</button>
          <button class="month-tab ${currentMonth === '6월' ? 'active' : ''}" onclick="changeMonth('6월')">6월</button>
          <button class="month-tab ${currentMonth === '7월' ? 'active' : ''}" onclick="changeMonth('7월')">7월</button>
          <button class="month-tab ${currentMonth === '9월' ? 'active' : ''}" onclick="changeMonth('9월')">9월</button>
          <button class="month-tab ${currentMonth === '10월' ? 'active' : ''}" onclick="changeMonth('10월')">10월</button>
        </div>

        ${grades.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">📊</div>
            <h3>성적 데이터가 없습니다</h3>
            <p>${selectedStudent} 학생의 ${currentMonth === 'all' ? '전체' : currentMonth} 성적이 없습니다</p>
          </div>
        ` : `
          <div class="grade-table">
            <table>
              <thead>
                <tr>
                  <th>시험</th>
                  <th class="subject-header" colspan="4">국어</th>
                  <th class="subject-header" colspan="4">수학</th>
                  <th class="subject-header" colspan="2">영어</th>
                  <th class="subject-header" colspan="4">탐구1</th>
                  <th class="subject-header" colspan="4">탐구2</th>
                </tr>
                <tr>
                  <th>월</th>
                  <th>원점수</th><th>표준점수</th><th>백분위</th><th>등급</th>
                  <th>원점수</th><th>표준점수</th><th>백분위</th><th>등급</th>
                  <th>원점수</th><th>등급</th>
                  <th>원점수</th><th>표준점수</th><th>백분위</th><th>등급</th>
                  <th>원점수</th><th>표준점수</th><th>백분위</th><th>등급</th>
                </tr>
              </thead>
              <tbody>
                ${grades.map(g => `
                  <tr>
                    <td><strong>${g.month}</strong></td>
                    <td>${g.국어_원점수 || '-'}</td>
                    <td>${g.국어_표준점수 || '-'}</td>
                    <td>${g.국어_백분위 || '-'}</td>
                    <td class="grade-value ${getGradeClass(g.국어_등급)}">${g.국어_등급 || '-'}</td>
                    <td>${g.수학_원점수 || '-'}</td>
                    <td>${g.수학_표준점수 || '-'}</td>
                    <td>${g.수학_백분위 || '-'}</td>
                    <td class="grade-value ${getGradeClass(g.수학_등급)}">${g.수학_등급 || '-'}</td>
                    <td>${g.영어_원점수 || '-'}</td>
                    <td class="grade-value ${getGradeClass(g.영어_등급)}">${g.영어_등급 || '-'}</td>
                    <td>${g.탐구1_원점수 || '-'}</td>
                    <td>${g.탐구1_표준점수 || '-'}</td>
                    <td>${g.탐구1_백분위 || '-'}</td>
                    <td class="grade-value ${getGradeClass(g.탐구1_등급)}">${g.탐구1_등급 || '-'}</td>
                    <td>${g.탐구2_원점수 || '-'}</td>
                    <td>${g.탐구2_표준점수 || '-'}</td>
                    <td>${g.탐구2_백분위 || '-'}</td>
                    <td class="grade-value ${getGradeClass(g.탐구2_등급)}">${g.탐구2_등급 || '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      `;
    }

    function changeMonth(month) {
      currentMonth = month;
      renderContent();
    }

    function getStudentAllGrades(studentName, month) {
      let results = [];

      if (month === 'all') {
        Object.entries(examsData).forEach(([m, data]) => {
          if (data && Array.isArray(data)) {
            const exam = data.find(e => e.이름 === studentName);
            if (exam) results.push({ month: m, ...exam });
          }
        });
      } else {
        const data = examsData[month];
        if (data && Array.isArray(data)) {
          const exam = data.find(e => e.이름 === studentName);
          if (exam) results.push({ month: month, ...exam });
        }
      }

      return results;
    }

    function getGradeClass(grade) {
      if (!grade) return '';
      const g = parseInt(grade);
      if (g === 1) return 'grade-1';
      if (g === 2) return 'grade-2';
      if (g === 3) return 'grade-3';
      if (g === 4) return 'grade-4';
      if (g === 5) return 'grade-5';
      return 'grade-poor';
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <h3>⚠️ 오류</h3>
          <p>${message}</p>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
