<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모의고사 분석 시스템 - 민족사관고등학교</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fa;
      --sidebar-bg: #ffffff;
      --content-bg: #ffffff;
      --border: #e0e7ef;
      --border-hover: #4a90e2;
      --primary: #2196f3;
      --primary-dark: #1976d2;
      --text: #1a2332;
      --text-secondary: #546e7a;
      --text-muted: #90a4ae;
      --shadow: rgba(0,0,0,0.04);
      --shadow-hover: rgba(33,150,243,0.12);
      --grade-1: #4caf50;
      --grade-2: #8bc34a;
      --grade-3: #ffc107;
      --grade-4: #ff9800;
      --grade-5: #ff5722;
      --grade-poor: #f44336;
      --radius: 8px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow-y: auto;
      box-shadow: 2px 0 8px var(--shadow);
      z-index: 100;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .student-list {
      padding: 12px;
    }

    .student-list-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      padding: 0 8px;
    }

    .student-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      margin-bottom: 3px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .student-item:hover {
      border-color: var(--border-hover);
      box-shadow: 0 2px 6px var(--shadow-hover);
      transform: translateX(3px);
    }

    .student-item.active {
      background: linear-gradient(135deg, #e3f2fd 0%, #f0f8ff 100%);
      border-color: var(--primary);
      font-weight: 600;
    }

    .student-name {
      font-size: 14px;
      color: var(--text);
    }

    .student-badge {
      display: inline-block;
      padding: 3px 7px;
      background: var(--primary);
      color: white;
      font-size: 10px;
      font-weight: 600;
      border-radius: 5px;
    }

    .main-content {
      margin-left: 260px;
      flex: 1;
      padding: 32px;
      min-height: 100vh;
    }

    .content-header {
      margin-bottom: 20px;
    }

    .content-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .content-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .month-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .month-tab {
      padding: 8px 16px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .month-tab:hover {
      border-color: var(--border-hover);
      background: #f5f9fc;
    }

    .month-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .grade-table {
      background: var(--content-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      box-shadow: 0 1px 4px var(--shadow);
    }

    .grade-table table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .grade-table th {
      background: #f8f9fa;
      color: var(--text);
      padding: 10px 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }

    .grade-table th.subject-header {
      background: #e8eef3;
      font-size: 12px;
    }

    .grade-table th:last-child {
      border-right: none;
    }

    .grade-table td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 12px;
    }

    .grade-table td:last-child {
      border-right: none;
    }

    .grade-table tr:last-child td {
      border-bottom: none;
    }

    .grade-table tbody tr:hover {
      background: #f8fafb;
    }

    .grade-table td:first-child {
      font-weight: 600;
      background: #fafbfc;
    }

    .grade-value {
      font-weight: 700;
    }

    .grade-1 { color: var(--grade-1); }
    .grade-2 { color: var(--grade-2); }
    .grade-3 { color: var(--grade-3); }
    .grade-4 { color: var(--grade-4); }
    .grade-5 { color: var(--grade-5); }
    .grade-6, .grade-7, .grade-8, .grade-9 { color: var(--grade-poor); }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 12px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .error, .empty {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .error {
      border-color: var(--grade-poor);
      color: var(--grade-poor);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: relative;
        height: auto;
      }

      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📊 모의고사 분석</h1>
      <p>민족사관고등학교 3학년 2반</p>
    </div>

    <div class="student-list">
      <div class="student-list-title">학생 목록</div>
      <div id="studentList">
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">로딩 중...</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div id="content">
      <div class="empty">
        <div class="empty-icon">👈</div>
        <h3>학생을 선택해주세요</h3>
        <p>왼쪽 사이드바에서 학생을 클릭하면 성적표를 볼 수 있습니다</p>
      </div>
    </div>
  </main>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzhGzErp_fxQOh8HDHHGEIn305UuO05OHXLzimvrNsOXfbFltG7V0uczk_diEu_HsViPg/exec';

    let studentsData = [];
    let examsData = {};
    let selectedStudent = null;
    let currentMonth = 'all';

    async function init() {
      try {
        const students = await fetchStudents();
        studentsData = students;

        const months = ['3월', '5월', '6월', '7월', '9월', '10월'];
        for (const month of months) {
          const data = await fetchExamData(month);
          examsData[month] = data;
        }

        renderStudentList();
      } catch (error) {
        console.error('초기화 오류:', error);
        showError('데이터를 불러오는데 실패했습니다.');
      }
    }

    async function fetchStudents() {
      const response = await fetch(`${API_URL}?action=getAllStudents`);
      return await response.json();
    }

    async function fetchExamData(month) {
      try {
        const response = await fetch(`${API_URL}?action=getExamData&month=${month}`);
        return await response.json();
      } catch (error) {
        return [];
      }
    }

    function renderStudentList() {
      const list = document.getElementById('studentList');

      if (studentsData.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>학생 데이터가 없습니다</p></div>';
        return;
      }

      list.innerHTML = studentsData.map(student => `
        <div class="student-item ${selectedStudent === student.이름 ? 'active' : ''}" onclick="selectStudent('${student.이름}')">
          <span class="student-name">${student.이름}</span>
          <span class="student-badge">${getExamCount(student.이름)}</span>
        </div>
      `).join('');
    }

    function getExamCount(studentName) {
      let count = 0;
      Object.values(examsData).forEach(monthData => {
        if (monthData && Array.isArray(monthData)) {
          if (monthData.find(e => e.이름 === studentName)) count++;
        }
      });
      return count + '회';
    }

    function selectStudent(studentName) {
      selectedStudent = studentName;
      currentMonth = 'all';
      renderStudentList();
      renderContent();
    }

    function renderContent() {
      const content = document.getElementById('content');

      if (!selectedStudent) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">👈</div>
            <h3>학생을 선택해주세요</h3>
            <p>왼쪽 사이드바에서 학생을 클릭하면 성적표를 볼 수 있습니다</p>
          </div>
        `;
        return;
      }

      const grades = getStudentAllGrades(selectedStudent, currentMonth);

      if (grades.length === 0) {
        content.innerHTML = `
          <div class="content-header">
            <h2 class="content-title">${selectedStudent} 학생 성적표</h2>
            <p class="content-subtitle">시험별 상세 성적을 확인할 수 있습니다</p>
          </div>
          <div class="month-tabs">
            <button class="month-tab ${currentMonth === 'all' ? 'active' : ''}" onclick="changeMonth('all')">전체</button>
            <button class="month-tab ${currentMonth === '3월' ? 'active' : ''}" onclick="changeMonth('3월')">3월</button>
            <button class="month-tab ${currentMonth === '5월' ? 'active' : ''}" onclick="changeMonth('5월')">5월</button>
            <button class="month-tab ${currentMonth === '6월' ? 'active' : ''}" onclick="changeMonth('6월')">6월</button>
            <button class="month-tab ${currentMonth === '7월' ? 'active' : ''}" onclick="changeMonth('7월')">7월</button>
            <button class="month-tab ${currentMonth === '9월' ? 'active' : ''}" onclick="changeMonth('9월')">9월</button>
            <button class="month-tab ${currentMonth === '10월' ? 'active' : ''}" onclick="changeMonth('10월')">10월</button>
          </div>
          <div class="empty">
            <div class="empty-icon">📊</div>
            <h3>성적 데이터가 없습니다</h3>
            <p>${selectedStudent} 학생의 ${currentMonth === 'all' ? '전체' : currentMonth} 성적이 없습니다</p>
          </div>
        `;
        return;
      }

      // 학생이 응시한 과목만 추출
      const subjectGroups = extractStudentSubjects(grades[0]);

      content.innerHTML = `
        <div class="content-header">
          <h2 class="content-title">${selectedStudent} 학생 성적표</h2>
          <p class="content-subtitle">시험별 상세 성적을 확인할 수 있습니다</p>
        </div>

        <div class="month-tabs">
          <button class="month-tab ${currentMonth === 'all' ? 'active' : ''}" onclick="changeMonth('all')">전체</button>
          <button class="month-tab ${currentMonth === '3월' ? 'active' : ''}" onclick="changeMonth('3월')">3월</button>
          <button class="month-tab ${currentMonth === '5월' ? 'active' : ''}" onclick="changeMonth('5월')">5월</button>
          <button class="month-tab ${currentMonth === '6월' ? 'active' : ''}" onclick="changeMonth('6월')">6월</button>
          <button class="month-tab ${currentMonth === '7월' ? 'active' : ''}" onclick="changeMonth('7월')">7월</button>
          <button class="month-tab ${currentMonth === '9월' ? 'active' : ''}" onclick="changeMonth('9월')">9월</button>
          <button class="month-tab ${currentMonth === '10월' ? 'active' : ''}" onclick="changeMonth('10월')">10월</button>
        </div>

        <div class="grade-table">
          <table>
            <thead>
              <tr>
                <th rowspan="2">시험</th>
                ${subjectGroups.map(sg => `<th colspan="${sg.metrics.length}" class="subject-header">${sg.subject}</th>`).join('')}
              </tr>
              <tr>
                ${subjectGroups.map(sg => sg.metrics.map(m => `<th>${m}</th>`).join('')).join('')}
              </tr>
            </thead>
            <tbody>
              ${grades.map(g => `
                <tr>
                  <td>${g.month}</td>
                  ${subjectGroups.map(sg =>
                    sg.metrics.map(m => {
                      const key = `${sg.subject}_${m}`;
                      const value = g[key] || '-';
                      const isGrade = m === '등급';
                      return `<td class="${isGrade ? 'grade-value ' + getGradeClass(value) : ''}">${value}</td>`;
                    }).join('')
                  ).join('')}
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    // 학생이 응시한 과목만 추출
    function extractStudentSubjects(gradeData) {
      if (!gradeData) return [];

      const allKeys = Object.keys(gradeData).filter(k => k !== 'month' && k !== 'error' && k !== '번호' && k !== '이름');
      const subjectMap = {};

      allKeys.forEach(key => {
        const parts = key.split('_');
        if (parts.length >= 2) {
          const metric = parts[parts.length - 1];
          const subject = parts.slice(0, -1).join('_');

          // 값이 있는 과목만 포함
          if (gradeData[key]) {
            if (!subjectMap[subject]) {
              subjectMap[subject] = new Set();
            }
            subjectMap[subject].add(metric);
          }
        }
      });

      // 과목별로 정리
      return Object.entries(subjectMap).map(([subject, metricsSet]) => ({
        subject: subject,
        metrics: Array.from(metricsSet).sort((a, b) => {
          const order = ['원점수', '표준점수', '백분위', '등급'];
          return order.indexOf(a) - order.indexOf(b);
        })
      }));
    }

    function changeMonth(month) {
      currentMonth = month;
      renderContent();
    }

    function getStudentAllGrades(studentName, month) {
      let results = [];

      if (month === 'all') {
        Object.entries(examsData).forEach(([m, data]) => {
          if (data && Array.isArray(data)) {
            const exam = data.find(e => e.이름 === studentName);
            if (exam) results.push({ month: m, ...exam });
          }
        });
      } else {
        const data = examsData[month];
        if (data && Array.isArray(data)) {
          const exam = data.find(e => e.이름 === studentName);
          if (exam) results.push({ month: month, ...exam });
        }
      }

      return results;
    }

    function getGradeClass(grade) {
      if (!grade || grade === '-') return '';
      const g = parseInt(grade);
      if (isNaN(g)) return '';
      if (g === 1) return 'grade-1';
      if (g === 2) return 'grade-2';
      if (g === 3) return 'grade-3';
      if (g === 4) return 'grade-4';
      if (g === 5) return 'grade-5';
      return 'grade-6';
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <h3>⚠️ 오류</h3>
          <p>${message}</p>
        </div>
      `;
    }

    init();
  </script>
</body>
</html>
